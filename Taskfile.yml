version: '3'

vars:
  APP_NAME: axiom
  BUILD_DIR: build

tasks:
  # ── Tâches standard ────────────────────────────────────────────
  build:
    cmds:
      - go build -tags wails -o {{.BUILD_DIR}}/{{.APP_NAME}}.exe -ldflags="-s -w" ./
    platforms: [windows]

  build:linux:
    cmds:
      - go build -tags wails -o {{.BUILD_DIR}}/{{.APP_NAME}} -ldflags="-s -w" ./

  build:darwin:
    cmds:
      - go build -tags wails -o {{.BUILD_DIR}}/{{.APP_NAME}} -ldflags="-s -w" ./

  # ── Tâches requises par wails3 build ───────────────────────────
  # wails3 cherche des tâches nommées "<platform>:build"
  windows:build:
    cmds:
      - cmd /c if not exist {{.BUILD_DIR}} mkdir {{.BUILD_DIR}}
      - go build -tags wails -o {{.BUILD_DIR}}/{{.APP_NAME}}.exe -ldflags="-s -w" ./

  darwin:build:
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - go build -tags wails -o {{.BUILD_DIR}}/{{.APP_NAME}} -ldflags="-s -w" ./

  linux:build:
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - go build -tags wails -o {{.BUILD_DIR}}/{{.APP_NAME}} -ldflags="-s -w" ./

  # ── Développement ──────────────────────────────────────────────
  dev:
    cmds:
      - go run -tags wails ./

  run:
    cmds:
      - go run ./

  # ── Tests & nettoyage ──────────────────────────────────────────
  test:
    cmds:
      - go test ./...

  clean:
    cmds:
      - cmd /c if exist build\axiom.exe del build\axiom.exe
    platforms: [windows]