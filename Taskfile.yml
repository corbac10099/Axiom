version: '3'

vars:
  APP_NAME: axiom
  BUILD_DIR: build

tasks:
  # ── Build production ───────────────────────────────────────────
  build:
    desc: "Build Axiom IDE (Windows, production)"
    cmds:
      - wails build -platform windows/amd64 -o {{.APP_NAME}}.exe
    platforms: [windows]

  build:linux:
    cmds:
      - wails build -platform linux/amd64

  build:darwin:
    cmds:
      - wails build -platform darwin/amd64

  # ── Développement avec hot-reload ─────────────────────────────
  dev:
    desc: "Lancer en mode dev (hot-reload Wails v2)"
    cmds:
      - wails dev

  # ── Mode headless (core Go sans UI) ───────────────────────────
  run:
    desc: "Lancer le core sans UI Wails"
    cmds:
      - go run ./

  # ── Tests & nettoyage ──────────────────────────────────────────
  test:
    cmds:
      - go test ./...

  test:verbose:
    cmds:
      - go test -v ./...

  clean:
    cmds:
      - cmd /c if exist build rmdir /s /q build
    platforms: [windows]